<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Important for iPhone/Android app opening -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="icon" type="image/png" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

  <title>Astro-Shree Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-pink-500 via-purple-600 to-indigo-700 min-h-screen flex items-center justify-center p-5">

  <div class="bg-white/20 backdrop-blur-2xl border border-white/30 rounded-[35px] shadow-2xl p-7 max-w-md w-full text-center text-white">

    <div class="text-6xl mb-3">🔮</div>

    <h1 class="text-4xl font-extrabold mb-3">Secure Your Divine Slot</h1>

    <p class="text-white/90 mb-5">
      Choose your payment app and complete your booking.
    </p>

    <div class="bg-yellow-300 text-purple-900 font-bold rounded-2xl p-4 mb-6 shadow-lg">
      🎁 Free Reward: Lucky Color + Lucky Number Guidance
    </div>

    <div class="space-y-4 mb-6">

      <a href="upi://pay?pa=8484013977@ybl&pn=Astro%20Shree&cu=INR"
   class="block bg-gradient-to-r from-green-400 to-emerald-600 text-white font-extrabold py-4 rounded-2xl shadow-xl text-xl hover:scale-105 transition">
   ✅ Pay via Any UPI App
</a>

      <button onclick="payPhonePe()"
        class="w-full bg-gradient-to-r from-purple-700 to-violet-500 text-white font-bold py-4 rounded-2xl shadow-lg text-xl">
        💜 Pay with PhonePe
      </button>

      <button onclick="payGooglePay()"
        class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-bold py-4 rounded-2xl shadow-lg text-xl">
        💙 Pay with Google Pay
      </button>

      <button onclick="payWhatsAppPay()"
        class="w-full bg-gradient-to-r from-green-500 to-lime-500 text-white font-bold py-4 rounded-2xl shadow-lg text-xl">
        💚 Pay with WhatsApp Pay
      </button>

    </div>

    <button onclick="payAnyUPI()"
      class="w-full bg-white/85 text-gray-800 rounded-2xl p-4 mb-5 shadow-lg">
      <p class="text-sm font-semibold text-gray-600 mb-1">Click UPI ID to Pay</p>
      <h2 class="text-2xl font-extrabold text-purple-700">8484013977@ybl</h2>
    </button>

    <button onclick="copyUPI()"
      class="w-full bg-yellow-300 text-purple-900 font-bold py-3 rounded-2xl shadow-lg mb-4">
      📋 Copy UPI ID
    </button>

    <a href="https://wa.me/918484013977?text=Namaste%20Astro-Shree,%20I%20have%20completed%20the%20payment.%20Please%20find%20my%20payment%20screenshot."
       target="_blank"
       class="block bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg mb-4">
      💬 Send Screenshot on WhatsApp
    </a>

    <a href="index.html"
       class="block bg-white/25 text-white font-bold py-4 rounded-2xl shadow-lg">
      ⬅ Back to Home
    </a>

    <p class="text-xs text-white/80 mt-5">
      Best result के लिए link को Chrome/Safari में open करें.
    </p>

  </div>

<script>
  const upiId = "8484013977@ybl";
  const payeeName = "Astro Shree";

  function upiLink() {
    return "upi://pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR";
  }

  function openApp(appLink) {
    window.location.href = appLink;

    setTimeout(function () {
      window.location.href = upiLink();
    }, 1200);
  }

  function payAnyUPI() {
    window.location.href = upiLink();
  }

  function payPhonePe() {
    var androidPhonePe =
      "intent://pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR#Intent;scheme=upi;package=com.phonepe.app;end";

    var iosPhonePe =
      "phonepe://pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR";

    if (/android/i.test(navigator.userAgent)) {
      openApp(androidPhonePe);
    } else {
      openApp(iosPhonePe);
    }
  }

  function payGooglePay() {
    var androidGPay =
      "intent://upi/pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR#Intent;scheme=tez;package=com.google.android.apps.nbu.paisa.user;end";

    var iosGPay =
      "gpay://upi/pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR";

    if (/android/i.test(navigator.userAgent)) {
      openApp(androidGPay);
    } else {
      openApp(iosGPay);
    }
  }

  function payWhatsAppPay() {
    var androidWhatsApp =
      "intent://pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR#Intent;scheme=upi;package=com.whatsapp;end";

    var iosWhatsApp =
      "whatsapp://pay?pa=" + upiId +
      "&pn=" + encodeURIComponent(payeeName) +
      "&cu=INR";

    if (/android/i.test(navigator.userAgent)) {
      openApp(androidWhatsApp);
    } else {
      openApp(iosWhatsApp);
    }
  }

  function copyUPI() {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(upiId);
      alert("UPI ID copied: " + upiId);
    } else {
      alert("UPI ID: " + upiId);
    }
  }
</script>

</body>
</html>
